run_id: qwen3-basic-test-fixture
student_model: Qwen/Qwen3-4B
teacher_model: Qwen/Qwen3-8B
teacher_mode: stronger_model
feedback_policy: hint_only
max_examples: 5
output_dir: runs/qwen3-basic-test-fixture
allow_missing_slurm_account_for_local: true

generation:
  max_new_tokens: 512
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5

teacher_generation:
  max_new_tokens: 1024
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5

slurm:
  account: null
  partition: u22
  cpus: 16
  gpus: 1
  mem_per_cpu: 4096
  cuda_module: u22/cuda/12.4
